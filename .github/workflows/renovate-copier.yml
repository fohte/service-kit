name: Renovate copier

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  id-token: write

jobs:
  copier-update:
    runs-on: ubuntu-slim
    if: >-
      github.actor == 'renovate[bot]' &&
      startsWith(github.head_ref, 'renovate/https-github-com-fohte-generic-boilerplate-')

    steps:
      - name: Federate GitHub token via octo-sts
        id: octo-sts
        uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        with:
          scope: fohte
          identity: ${{ github.event.repository.name }}-renovate-copier
          domain: octo-sts.fohte.net

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.octo-sts.outputs.token }}
          # mergiraf reconstructs the pre-update revision from HEAD~1; the
          # default shallow clone (depth 1) leaves it unreachable.
          fetch-depth: 2

      - name: Restore executable bit on scripts/bootstrap
        run: |
          if [ -f scripts/bootstrap ]; then
            chmod +x scripts/bootstrap
          fi

      - name: Detect copier conflicts
        id: detect
        run: |
          # copier-specific marker (not git's `<<<<<<< HEAD`).
          # The pattern is split (`'before '` + `updating`) so this workflow
          # does not self-match when checked into the repo.
          if git grep --untracked -l '<<<<<<< before '"updating" > /tmp/copier-conflicts.txt && [ -s /tmp/copier-conflicts.txt ]; then
            echo "has_conflicts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_conflicts=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve copier conflicts with mergiraf
        if: steps.detect.outputs.has_conflicts == 'true'
        continue-on-error: true
        env:
          # renovate: datasource=gitea-tags depName=mergiraf/mergiraf registryUrl=https://codeberg.org
          MERGIRAF_VERSION: v0.17.0
        run: |
          set -uo pipefail
          # Download the mergiraf binary directly from the upstream release.
          # Going through mise/aqua would re-read the repo's .mise.toml, which
          # is itself often a copier conflict file and fails to parse.
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          case "$(uname -m)" in
            x86_64) target=x86_64-unknown-linux-musl ;;
            aarch64) target=aarch64-unknown-linux-musl ;;
            *) echo "unsupported arch: $(uname -m)" >&2; exit 1 ;;
          esac
          curl -sSfL \
            "https://codeberg.org/mergiraf/mergiraf/releases/download/${MERGIRAF_VERSION}/mergiraf_${target}.tar.gz" \
            | tar -xz -C "$tmpdir"
          chmod +x "$tmpdir/mergiraf"
          while IFS= read -r f; do
            echo "mergiraf solve: $f"
            if ! "$tmpdir/mergiraf" solve --keep-backup=false "$f"; then
              echo "  -> mergiraf left conflicts in $f"
            fi
          done < /tmp/copier-conflicts.txt

      - name: Commit and push changes
        uses: suzuki-shunsuke/commit-action@06e3b49d4706498d325d29bd85adc82ecf2f5d8f # v1.0.0
        with:
          commit_message: 'chore: post-process copier update'
          workflow: deny
          github_token: ${{ steps.octo-sts.outputs.token }}
