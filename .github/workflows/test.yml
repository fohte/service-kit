name: Test

on:
  push:
    branches-ignore:
      # Skip release-please branches (Release PRs) since they only update CHANGELOG and version
      - release-please--branches--*

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: 'true'
      RUSTC_WRAPPER: 'sccache'

    steps:
      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts
        with:
          scope: fohte
          identity: ${{ github.event.repository.name }}
          domain: octo-sts.fohte.net

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Check if current commit is auto-format by bot
        id: check-auto-format
        run: |
          commit_message=$(git log -1 --format=%s)
          commit_author=$(git log -1 --format=%an)
          echo "Current commit message: $commit_message"
          echo "Current commit author: $commit_author"

          # Skip if the current commit is an auto-format commit by a bot
          # to prevent infinite loop: auto-format push -> CI -> auto-format push -> ...
          if [ "$commit_message" = "style: auto-format" ] && [[ "$commit_author" == *"[bot]"* ]]; then
            echo "skip_commit=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_commit=false" >> "$GITHUB_OUTPUT"
          fi

      # Run rustup before mise-action to prevent race condition.
      # Multiple cargo: tools in mise.toml trigger parallel rustup component downloads,
      # causing "could not rename downloaded file" errors.
      - run: rustup show

      # Run sccache-action before mise-action so that sccache binary is
      # available when mise installs cargo tools (RUSTC_WRAPPER=sccache).
      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.6.11

      - run: corepack enable

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('node/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install pnpm dependencies (node)
        run: cd "node" && pnpm install --frozen-lockfile

      - name: Fetch cargo dependencies (rust)
        run: cd "rust" && cargo fetch

      - name: Run lefthook
        id: lefthook
        continue-on-error: true
        env:
          # pinact's min-age check calls the GitHub API; without a token it hits
          # the 60 req/h unauthenticated limit shared per IP and fails on CI.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: lefthook run pre-commit --all-files

      # Formatters configured with `stage_fixed: true` run `git add` after formatting,
      # which stages the changes.
      # commit-action uses `git ls-files --modified` which only detects unstaged changes.
      # https://github.com/suzuki-shunsuke/commit-action/blob/87b297f0ce551411b43d1880f4fb3cbc60381055/action.yaml#L57
      # We need to unstage the changes so commit-action can detect them.
      - name: Unstage changes for commit-action
        run: git restore --staged .

      - name: Commit formatted files
        if: ${{ !cancelled() && steps.check-auto-format.outputs.skip_commit != 'true' }}
        uses: suzuki-shunsuke/commit-action@06e3b49d4706498d325d29bd85adc82ecf2f5d8f # v1.0.0
        with:
          commit_message: 'style: auto-format'
          workflow: deny
          github_token: ${{ steps.octo-sts.outputs.token }}

      - name: Fail if lefthook failed
        if: steps.lefthook.outcome == 'failure'
        run: exit 1

  detect-changes:
    runs-on: ubuntu-slim
    outputs:
      node: ${{ steps.changes-node.outputs.any_changed }}
      rust: ${{ steps.changes-rust.outputs.any_changed }}
      workflow: ${{ steps.changes-workflow.outputs.any_changed }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2

      - name: Check for node changes
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        id: changes-node
        with:
          files: node/**

      - name: Check for rust changes
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        id: changes-rust
        with:
          files: rust/**

      - name: Check for workflow changes
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        id: changes-workflow
        with:
          files: .github/workflows/test.yml

  unit-test-node:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.node == 'true' ||
      needs.detect-changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.6.11

      - run: corepack enable

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('node/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - run: cd "node" && pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: node
        run: pnpm run test

  unit-test-rust:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.rust == 'true' ||
      needs.detect-changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: 'true'
      RUSTC_WRAPPER: 'sccache'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - run: rustup show

      # Run sccache-action before mise-action so that sccache binary is
      # available when mise installs cargo tools (RUSTC_WRAPPER=sccache).
      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.6.11

      - name: Run tests
        working-directory: rust
        run: cargo test

  # Aggregation gate for the per-package unit-test jobs. The dynamic per-package
  # job names cannot be pinned as required status checks, so this single
  # fixed-name job is the branch protection gate instead. It fails only when a
  # needed job failed; when every leg succeeds (or is skipped because nothing
  # changed) it is skipped, and a skipped required check counts as success.
  unit-test:
    runs-on: ubuntu-slim
    needs:
      - detect-changes
      - unit-test-node
      - unit-test-rust
    if: failure()
    steps:
      - run: exit 1
