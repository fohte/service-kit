on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

name: release-please

permissions:
  contents: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    outputs:
      node_release_created: ${{ steps.release.outputs['node--release_created'] }}
    steps:
      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts
        with:
          scope: fohte
          identity: ${{ github.event.repository.name }}-release-please
          domain: octo-sts.fohte.net

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ steps.octo-sts.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # `pnpm publish` skips versions already on the registry,
  # so re-running this job never republishes an existing version.
  publish-node:
    needs: release-please
    if: ${{ needs.release-please.outputs.node_release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2026.6.11

      - run: corepack enable

      - run: pnpm -C node install --frozen-lockfile

      - run: pnpm -C node build

      - name: Publish to npm
        run: pnpm -C node publish --access public --no-git-checks --provenance
