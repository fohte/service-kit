[tools]
lefthook = "2.1.9"
"github:ast-grep/ast-grep" = "0.44.1"

# lefthook hooks
actionlint = "1.7.12"
"github:betterleaks/betterleaks" = "1.6.1"
node = "24.18.0"
pinact = "4.1.0"
"github:fohte/basefmt" = "0.1.0"
"npm:@commitlint/cli" = "21.2.0"
"npm:prettier" = "3.9.4"
shellcheck = "0.11.0"
shfmt = "3.13.1"

[env]
# Share target dir across worktrees to avoid full recompilation
CARGO_TARGET_DIR = "{{config_root}}/target"
